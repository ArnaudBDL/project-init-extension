project:
  name: "tests"
  slug: "tests"

frontend:
  enabled: true
  stack: "angular"
  name: "Angular"
  variant: "none"
  variantName: "None"

server:
  enabled: true
  stack: "go"
  name: "Go"
  framework: "none"
  frameworkName: "None"
  local: true
  remote: true
  assets: true

data:
  databases:
    - key: "postgresql"
      name: "PostgreSQL"
    - key: "sqlite"
      name: "SQLite"
  searchEngines:
    - key: "elasticsearch"
      name: "Elasticsearch"
    - key: "opensearch"
      name: "OpenSearch"
    - key: "algolia"
      name: "Algolia"

shell:
  desktop:
    enabled: true
    stack: "tauri"
    name: "Tauri"

  mobile:
    enabled: true
    stack: "capacitor"
    name: "Capacitor"

  web:
    enabled: true
    stack: "docker"
    name: "Docker Web Runtime"

legacy:
  enabled: true
  codebase: "09-LEGACY/codebase"
  migration: "09-LEGACY/migration"
